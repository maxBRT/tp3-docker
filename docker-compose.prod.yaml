services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "81:81"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - api

  client:
    build: ./client
    restart: always

  api:
    build: ./api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=tp3docker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tp3docker"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
