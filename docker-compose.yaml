services:
  api: 
    image: maximebourret/tp3docker-api
    build: ./api
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:admin@db:5432/tp3docker?schema=public
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=tp3docker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tp3docker"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
